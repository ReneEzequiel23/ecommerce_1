<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proceso de Compra</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/procesoCompra.css" />
  </head>
  <body>
    <!-- Pagina Principal -->
    <!-- Edgar Arturo Acevedo Acosta 245769
          Rene Ezequiel Figueroa López 228691 -->
    <div class="containPP">
      <div id="containerPg" class="barraSuperior">
        <nav>
          <ul>
            <li>
              <div class="perfil">
                <input type="image" src="../Img/perfil.png" alt="Perfil" />
                <ul>
                  <!-- Tengo que Arreglar Este Css por que Solo se Activa
                     Cuando Tienes Presionado el Click en el Perfil 
                     y Aparece a la Izquierda xdddd-->
                  <li><a href="../pantallas/perfilUsuario.html">Perfil</a></li>
                  <li><a href="../pantallas/inicioDeSesion.html">Cerrar Sesión</a></li>
                </ul>
              </div>
            </li>
          </ul>
        </nav>
      </div>
      <div id="containerPg" class="menuLateral">
        <div class="menu">
          <ul>
            <li class="page"><a href="../pantallas/index.html">Inicio</a></li>
            <li class="page">
              <a href="../pantallas/catalogoProductos.html">Catalogo de Productos</a>
            </li>
            <li class="page"><a href="../pantallas/carritoCompras.html">Carrito de Compras</a></li>
            <li class="page">
              <a href="../pantallas/gestionDePedidos.html">Gestión de Pedidos</a>
            </li>
            <li class="page">
              <a href="../pantallas/administradorPantalla.html">Administrador</a>
            </li>
            <li class="page"><a href="../pantallas/inicioDeSesion.html">Iniciar Sesión</a></li>
          </ul>
        </div>
      </div>
      <div id="containerPg" class="contenido">
        <div class="primer-cont">
          <div class="caja-tabla">
            <table class="tabla-productos">
              <thead>
                <tr>
                  <th>Nombre del Producto</th>
                  <th>Precio</th>
                  <th>Cantidad</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><label for="nombre" id="nombre">nombre Libro</label></td>
                  <td><label for="precio" id="precio">XXX.XX</label></td>
                  <td><label for="cantidad" id="cantidad">1</label></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="metodoP">
            <h2>Metodo de Pago</h2>
            <form action="#" method="POST" class="formulario-pago">
              <div class="radios">
                <input type="radio" id="tarjeta" name="metodo_pago" value="tarjeta" />
                <label for="tarjeta">Tarjeta de Crédito/Débito</label>
              </div>
              <div class="radios">
                <input type="radio" id="oxxo" name="metodo_pago" value="oxxo" />
                <label for="oxxo">Oxxo</label>
              </div>
              <div class="radios">
                <input type="radio" id="transferencia" name="metodo_pago" value="transferencia" />
                <label for="transferencia">Transferencia Bancaria</label>
              </div>
          </div>
        </div>
        <div class="segundo-cont">
          <div class="contoF">
            <label for="costo">Costo Final</label>
            <input type="text" id="costo" name="costo"  />
            <label></label>
            <label></label>
            <label></label>
            <label></label>
            <!-- Para que se vea mas Chico el Costo final-->
          </div>
          <div class="botones">
              <button
                type="button"
                class="btn-cancelar"
                onclick="window.location.href = '../pantallas/carritoCompras.html'">
                Cancelar
              </button>
              <button type="submit" class="btn-confirmar" onclick="window.location.href = '../pantallas/compraRealizada.html'">Generar Pedido</button>
            </div>
        </div>
      </div>

      <div id="containerPg" class="piePagina">
        <h3 class="materia">Aplicaciones Web - Unidad 2</h3>
      </div>
    </div>
  </body>
</html>
